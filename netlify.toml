[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  # Netlify's secrets scanner (enabled by default since 2024) blocks
  # deploys when it finds env-var values in the build output. That's
  # the right behavior for server secrets, but VITE_* vars are
  # designed to be bundled into the client — and Supabase publishable
  # keys are explicitly safe to expose (they're gated by RLS on every
  # table). Whitelist the keys whose presence in dist/ is intentional.
  #
  # Add any new VITE_* var here when you introduce one. NEVER add
  # server-side secrets (SUPABASE_SERVICE_ROLE_KEY, FCM_*, etc.) —
  # those should never appear in the bundle in the first place.
  #
  # VITE_OWNER_EMAIL is a client-side UI gate (useIsOwner) — it's an
  # email identifier bundled on purpose, not a credential.
  #
  # SUPABASE_URL is the server-side twin of VITE_SUPABASE_URL — same
  # value (the public project endpoint), used by the Netlify functions
  # via process.env. The scanner finds that URL in the client bundle
  # (put there legitimately by the VITE_ twin) and attributes it to the
  # SUPABASE_URL key, so that key must be omitted too. The URL is a
  # public endpoint, NOT a secret — the real secret is
  # SUPABASE_SERVICE_ROLE_KEY, which never enters the bundle and stays
  # scanned.
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,VITE_REVENUECAT_API_KEY_IOS,VITE_REVENUECAT_API_KEY_ANDROID,VITE_OWNER_EMAIL,SUPABASE_URL"

  # Smart detection scans for things that LOOK like secrets by
  # pattern (long base64 strings, JWT shapes, keys with known
  # provider prefixes). It fires false positives on the Supabase
  # `sb_publishable_*` key format and on hashed JS bundle filenames
  # — value-based scanning above is enough for our setup, so we
  # turn smart detection off. Keep an eye on this if you add new
  # hardcoded credentials anywhere; smart detection would catch them.
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

  # Belt-and-braces: tell the scanner to skip the source paths where
  # third-party SDK code (and the .env.example file) contains strings
  # that pattern-match secret-looking shapes but aren't real secrets.
  # node_modules and dist are scanned by default; most false positives
  # come from there. .env.example holds variable names with empty
  # values, also harmless.
  SECRETS_SCAN_OMIT_PATHS = ".env.example,node_modules/**"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Headers = "Content-Type"

# ── Scheduled Functions ──────────────────────────────────────────────
# push-dispatch sweeps the notifications_queue every minute. Cheap —
# the function returns immediately when the queue is empty.
[functions."push-dispatch"]
  schedule = "* * * * *"
